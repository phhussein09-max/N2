<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مدير الصيدلية برو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c7da0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
</head>
<body>
<div id="appSection">
    <div class="header">
        <button id="notifBtn" class="notif-btn" onclick="window.switchPage('inbox')">🔔<span id="notifBadge" class="notif-badge" style="display:none;">0</span></button>
        <div class="title" id="appTitle" onclick="window.goHome()"></div>
        <div style="display: flex; gap: 8px;">
            <button id="settingsHeaderBtn" class="settings-header-btn" onclick="window.openSettingsModal()">⚙️</button>
            <button id="backBtn" class="back-btn" style="display: none;" onclick="window.goHome()">←</button>
        </div>
    </div>
    <div id="pageContent"></div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">جاري التحميل...</div>
</div>

<!-- نافذة تفاصيل الدواء -->
<div id="medModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <span class="close-modal" onclick="window.closeModal('medModal')">✖</span>
        <h3>تفاصيل الدواء</h3>
        <div id="medDetail" class="med-detail-grid"></div>
        <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
            <button id="editMedBtn" class="save-btn" onclick="window.editCurrentMed()">تعديل</button>
            <button id="addToPharmacyBtn" class="save-btn" style="background: var(--success);" onclick="window.addCurrentToPharmacy()">➕ إضافة إلى الصيدلية</button>
            <button class="cancel-btn" onclick="window.closeModal('medModal')">إلغاء</button>
        </div>
    </div>
</div>

<!-- نافذة إضافة / تعديل دواء الصيدلية -->
<div id="medFormModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <span class="close-modal" onclick="window.closeMedFormModal()">✖</span>
        <h3 id="medFormTitle">إضافة دواء</h3>
        <div class="med-form">
            <div class="form-row"><input type="text" id="medName" placeholder="الاسم التجاري *" class="form-input"><input type="text" id="scientificName" placeholder="الاسم العلمي" class="form-input"></div>
            <div class="form-row"><input type="text" id="company" placeholder="الشركة" class="form-input"><input type="text" id="origin" placeholder="المنشأ" class="form-input"></div>
            <div class="form-row">
                <input type="text" id="medCategory" list="medCategoriesList" placeholder="التصنيف" class="form-input">
                <datalist id="medCategoriesList"></datalist>
                <button type="button" class="small-btn" onclick="window.addNewCategory('medCategory')">➕ تصنيف جديد</button>
            </div>
            <div class="form-row"><input type="text" id="dosageForm" placeholder="الشكل الدوائي" class="form-input"><input type="text" id="dosage" placeholder="الجرعة" class="form-input"></div>
            <div class="form-row"><input type="date" id="medExpiry1" placeholder="تاريخ الانتهاء 1 *" class="form-input"><input type="date" id="medExpiry2" placeholder="تاريخ الانتهاء 2" class="form-input"><input type="date" id="medExpiry3" placeholder="تاريخ الانتهاء 3" class="form-input"></div>
            <div class="form-row"><input type="text" id="medBarcode" placeholder="الباركود" class="form-input"><button type="button" class="small-btn" id="scanBarcodeBtn" onclick="window.startBarcodeScanner('medBarcode')">📷 مسح باركود</button></div>
            <div class="form-row image-upload"><label class="image-upload-label">📷 اختر صورة<input type="file" id="medImage" accept="image/*" style="display: none;"></label><div id="imagePreview" class="image-preview"></div></div>
            <div class="form-actions"><button id="submitMedBtn" class="save-btn" onclick="window.saveMedFromForm()">حفظ الدواء</button><button class="cancel-btn" onclick="window.closeMedFormModal()">إلغاء</button></div>
        </div>
    </div>
</div>

<!-- نافذة إضافة دواء عام -->
<div id="generalFormModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <span class="close-modal" onclick="window.closeGeneralFormModal()">✖</span>
        <h3 id="generalFormTitle">إضافة دواء عام</h3>
        <div class="med-form">
            <div class="form-row"><input type="text" id="genName" placeholder="الاسم التجاري *" class="form-input"><input type="text" id="genScientificName" placeholder="الاسم العلمي" class="form-input"></div>
            <div class="form-row"><input type="text" id="genCompany" placeholder="الشركة" class="form-input"><input type="text" id="genOrigin" placeholder="المنشأ" class="form-input"></div>
            <div class="form-row">
                <input type="text" id="genCategory" list="genCategoriesList" placeholder="التصنيف" class="form-input">
                <datalist id="genCategoriesList"></datalist>
                <button type="button" class="small-btn" onclick="window.addNewCategory('genCategory')">➕ تصنيف جديد</button>
            </div>
            <div class="form-row"><input type="text" id="genDosageForm" placeholder="الشكل الدوائي" class="form-input"><input type="text" id="genDosage" placeholder="الجرعة" class="form-input"></div>
            <div class="form-row"><input type="text" id="genBarcode" placeholder="الباركود" class="form-input"><button type="button" class="small-btn" id="scanBarcodeGenBtn" onclick="window.startBarcodeScanner('genBarcode')">📷 مسح باركود</button></div>
            <div class="form-row image-upload"><label class="image-upload-label">📷 اختر صورة<input type="file" id="genImage" accept="image/*" style="display: none;"></label><div id="genImagePreview" class="image-preview"></div></div>
            <div class="form-actions"><button id="submitGeneralBtn" class="save-btn" onclick="window.saveGeneralMedFromForm()">حفظ الدواء</button><button class="cancel-btn" onclick="window.closeGeneralFormModal()">إلغاء</button></div>
        </div>
    </div>
</div>

<!-- نافذة مسح الباركود -->
<div id="barcodeScannerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="window.stopScannerAndClose()">✖</span>
        <h3>مسح الباركود</h3>
        <video id="scannerVideo" autoplay playsinline style="width:100%; border-radius:16px;"></video>
        <div id="scannerResult" style="margin-top:10px; color: var(--text); text-align: center;"></div>
        <div style="display: flex; gap: 8px; margin-top: 12px; justify-content: center;">
            <button id="manualBarcodeBtn" class="small-btn">📝 إدخال يدوي</button>
            <button class="save-btn" onclick="window.stopScannerAndClose()">إلغاء</button>
        </div>
    </div>
</div>

<!-- نافذة الإعدادات -->
<div id="settingsModal" class="modal">
    <div class="modal-content"><span class="close-modal" onclick="window.closeModal('settingsModal')">✖</span><h3>⚙️ الإعدادات</h3><div id="settingsContent"></div></div>
</div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('Service Worker مسجل بنجاح:', reg))
            .catch(err => console.error('فشل تسجيل Service Worker:', err));
    }
</script>
</body>
</html>
