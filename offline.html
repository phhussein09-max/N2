<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - مدير الصيدلية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Tahoma, sans-serif;
            background: #f8f9fa;
            color: #2d3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 3rem; margin-bottom: 16px; }
        p { margin-bottom: 24px; line-height: 1.5; }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #1f5068; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡</h1>
    <h2>لا يوجد اتصال بالإنترنت</h2>
    <p>عذراً، أنت حالياً غير متصل. يرجى التحقق من اتصالك بالشبكة ثم حاول مرة أخرى.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
    <p style="margin-top: 20px; font-size: 0.8rem;">✨ يمكنك استخدام التطبيق بدون إنترنت إذا كنت قد فتحته من قبل</p>
</div>
</body>
</html>
